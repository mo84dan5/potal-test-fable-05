<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1026" />
    <title>Portal Walk</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1026;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: env(safe-area-inset-top, 0);
        left: 0;
        right: 0;
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #hud .title {
        font-weight: 700;
        letter-spacing: 0.04em;
        opacity: 0.9;
      }
      #world-name {
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
        transition: background 0.6s;
      }
      #hint {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        padding: 10px 18px;
        border-radius: 999px;
        font-size: 14px;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        white-space: nowrap;
        opacity: 1;
        transition: opacity 1.2s ease;
      }
      #hint.hidden {
        opacity: 0;
      }
      .stick-base,
      .stick-knob {
        position: fixed;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 10;
      }
      .stick-base {
        width: 140px;
        height: 140px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.08);
      }
      .stick-knob {
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.55);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <span class="title">◆ Portal Walk</span>
      <span id="world-name">昼の世界</span>
    </div>
    <div id="hint">下半分で移動 / 上半分で見回し / はじくとダッシュ</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
